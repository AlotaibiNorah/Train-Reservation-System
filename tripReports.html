<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trip Reports</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
.report-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-bottom:20px;
}
.stat-card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  text-align:center;
  border-top:3px solid #0d4e8a;
}
.stat-card h3{
  font-size:12px;
  color:#666;
  margin-bottom:5px;
}
.stat-card p{
  font-size:18px;
  font-weight:bold;
  color:#0d4e8a;
}
.chart-container{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  margin-bottom:20px;
}
#tripsTable{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
#tripsTable th, #tripsTable td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
}
#tripsTable th{
  background:#0d4e8a;
  color:white;
  font-size:12px;
}
#tripsTable td{
  font-size:12px;
}
</style>
</head>
<body>

<div class="center-box">
  <div class="container" style="width:90%; max-width:900px;">

    <h2 style="color:#0d4e8a;">Trip Analytics</h2>

    <div class="report-grid">
      <div class="stat-card">
        <h3>Total Routes</h3>
        <p id="totalRoutes">0</p>
      </div>
      <div class="stat-card">
        <h3>Trips Today</h3>
        <p id="todayTrips">0</p>
      </div>
      <div class="stat-card">
        <h3>Trips This Month</h3>
        <p id="monthTrips">0</p>
      </div>
      <div class="stat-card">
        <h3>Trips This Year</h3>
        <p id="yearTrips">0</p>
      </div>
    </div>

    <table id="tripsTable">
      <thead>
        <tr>
          <th>#</th>
          <th>From</th>
          <th>To</th>
          <th>Departure</th>
        </tr>
      </thead>
      <tbody id="tripsBody"></tbody>
    </table>

    <div class="chart-container">
      <canvas id="tripChart"></canvas>
    </div>

    <a href="dashboard.html"
       style="display:block;margin-top:20px;text-decoration:none;color:#1e6fb9;font-weight:bold;">
       ← Back to Dashboard
    </a>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const routes = JSON.parse(localStorage.getItem("routes")) || [];

  let totalRoutes = routes.length;
  let todayTrips = 0;
  let monthTrips = 0;
  let yearTrips = 0;

  let cityStats = {};
  const today = new Date();

  const tripsBody = document.getElementById("tripsBody");
  tripsBody.innerHTML = ""; 
  let rowNumber = 1; 

  routes.forEach(route => {
    const tripDate = new Date(route.departure);

    
    if(tripDate.toDateString() === today.toDateString()) todayTrips++;

  
    if(tripDate.getMonth() === today.getMonth() && tripDate.getFullYear() === today.getFullYear()) monthTrips++;

    
    if(tripDate.getFullYear() === today.getFullYear()) yearTrips++;

   
    const routeName = route.from + " → " + route.to;
    cityStats[routeName] = (cityStats[routeName] || 0) + 1;

   
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${rowNumber}</td><td>${route.from}</td><td>${route.to}</td><td>${tripDate.toLocaleDateString()}</td>`;
    tripsBody.appendChild(tr);
    rowNumber++;
  });

  document.getElementById("totalRoutes").innerText = totalRoutes;
  document.getElementById("todayTrips").innerText = todayTrips;
  document.getElementById("monthTrips").innerText = monthTrips;
  document.getElementById("yearTrips").innerText = yearTrips;

  
  const ctx = document.getElementById("tripChart").getContext("2d");
  new Chart(ctx, {
    type: "bar",
    data: {
      labels: Object.keys(cityStats),
      datasets: [{
        label: "Trips per Route",
        data: Object.values(cityStats),
        backgroundColor: "#1e6fb9",
        borderRadius: 5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 2.5,
      plugins: {
        legend: { display: false },
        title: { display: true, text: "Trips by Route" }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { precision: 0 } 
        }
      }
    }
  });
});
</script>

</body>
</html>
