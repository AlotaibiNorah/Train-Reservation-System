<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seats Page</title>
<style>
body {
    font-family: sans-serif;
    background: url("train.jpg") no-repeat center center fixed;
    background-size: cover;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: 0 auto;
}

h1 {
    color: #0d4e8a;
    text-align: center;
}

.select-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    justify-content: center;
}

select, button {
    padding: 8px 12px;
    font-size: 14px;
    border-radius: 5px;
    border: 1px solid #0d4e8a;
}

.trip-card {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.trip-info {
    display: flex;
    flex-direction: column;
}

.trip-name {
    font-size: 18px;
    font-weight: bold;
}

.trip-seats {
    font-size: 14px;
}

.book-btn {
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    color: white;
}

.blue { background-color: #1e6fb9; }
.yellow { background-color: #FFD700; color: black; }
.gray { background-color: #A9A9A9; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">
    <h1 style="color:black; text-align:center; margin-bottom:20px;">Available Trips</h1>

    <div class="select-group">
        <select id="fromSelect">
            <option value="">From</option>
            <option>Riyadh</option>
            <option>Jeddah</option>
            <option>Makkah</option>
            <option>Madina</option>
            <option>Dammam</option>
            <option>Khobar</option>
            <option>Taif</option>
            <option>Tabuk</option>
            <option>Al Bahah</option>
            <option>Yanbu</option>
            <option>Al Jubail</option>
            <option>Al Ahsa</option>
        </select>

        <select id="toSelect">
            <option value="">To</option>
            <option>Riyadh</option>
            <option>Jeddah</option>
            <option>Makkah</option>
            <option>Madina</option>
            <option>Dammam</option>
            <option>Khobar</option>
            <option>Taif</option>
            <option>Tabuk</option>
            <option>Al Bahah</option>
            <option>Yanbu</option>
            <option>Al Jubail</option>
            <option>Al Ahsa</option>
        </select>

        <button onclick="showTrip()">Show Trip</button>
    </div>

    <div id="tripContainer"></div>



<a href="dashboard.html"
   style="display:block; text-align:center; margin-top:20px; 
          font-size:14px; color:#0d4e8a; text-decoration:none; 
          font-weight:bold;">
   ← Back to Dashboard
</a></div>

<script>
    
const cities = ["Riyadh","Jeddah","Makkah","Madina","Dammam","Khobar","Taif","Tabuk","Al Bahah","Yanbu","Al Jubail","Al Ahsa"];
const MAX_SEATS = 38;


let trips = [];
cities.forEach(from => {
    cities.forEach(to => {
        if(from !== to){
            trips.push({route: from + " → " + to});
        }
    });
});

function showTrip(){
    const from = document.getElementById('fromSelect').value;
    const to = document.getElementById('toSelect').value;
    const container = document.getElementById('tripContainer');
    container.innerHTML = '';

    if(!from || !to){
        alert("Please select both From and To cities.");
        return;
    }
    if(from === to){
        alert("From and To cannot be the same.");
        return;
    }

    const selectedRoute = from + " → " + to;


    const bookingHistory = JSON.parse(localStorage.getItem('bookingHistory')) || [];

  
    let bookedSeats = 0;
    bookingHistory.forEach(b => {
        if(b.trip === selectedRoute && b.status === 'Active'){
            bookedSeats += b.seats.length;
        }
    });

    const availableSeats = MAX_SEATS - bookedSeats;

    const card = document.createElement('div');
    card.classList.add('trip-card');

    if(availableSeats === 0){
        card.classList.add('gray');
    } else if(availableSeats <= 10){
        card.classList.add('yellow');
    } else {
        card.classList.add('blue');
    }

    card.innerHTML = `
        <div class="trip-info">
            <div class="trip-name">${selectedRoute}</div>
            <div class="trip-seats">Seats Available: ${availableSeats}</div>
        </div>
        <button class="book-btn" ${availableSeats===0 ? 'disabled' : ''} onclick="bookTrip('${selectedRoute}')">Book</button>
    `;

    container.appendChild(card);
}


function bookTrip(route){
   
    localStorage.setItem('selectedTrip', JSON.stringify({route}));
    window.location.href = 'Book.html';
}
</script>
</body>
</html>
