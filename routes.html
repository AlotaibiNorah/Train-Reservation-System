<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manage Routes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #instructionText {
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
            display: none;
            font-weight: bold; 
        }

        #routeForm select,
        #routeForm input {
            margin-right: 5px; 
            margin-bottom: 5px;
            vertical-align: middle;
        }

        #routeForm button[type="submit"] {
            margin-top: 5px;
        }

        .action-btn-small {
            font-size: 12px;
            padding: 4px 8px;
            margin: 2px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            color: white;
            width: 70px;
            text-align: center;
        }

        table {
            width: 100%;
            margin-top: 5px;
            border-collapse: collapse;
        }
    </style>
</head>

<body>

    <div class="center-box">
        <div class="container">
            <h2 style="margin-bottom:20px; color:#0d4e8a">Manage Routes</h2>

            <!-- Add Route Form -->
            <form id="routeForm">
                <select id="from" required>
                    <option value="">From (City)</option>
                    <option>Riyadh</option>
                    <option>Jeddah</option>
                    <option>Makkah</option>
                    <option>Madinah</option>
                    <option>Dammam</option>
                    <option>Khobar</option>
                    <option>Dhahran</option>
                    <option>Taif</option>
                    <option>Tabuk</option>
                    <option>Al Bahah</option>
                    <option>Yanbu</option>
                    <option>Al Jubail</option>
                    <option>Al Ahsa</option>
                </select>

                <select id="to" required>
                    <option value="">To (City)</option>
                    <option>Riyadh</option>
                    <option>Jeddah</option>
                    <option>Makkah</option>
                    <option>Madinah</option>
                    <option>Dammam</option>
                    <option>Khobar</option>
                    <option>Dhahran</option>
                    <option>Taif</option>
                    <option>Tabuk</option>
                    <option>Al Bahah</option>
                    <option>Yanbu</option>
                    <option>Al Jubail</option>
                    <option>Al Ahsa</option>
                </select>

                <input type="datetime-local" id="departure" required>
                <input type="datetime-local" id="arrival" required>
                <button type="submit" class="action-btn">Add Route</button>
            </form>

            <!-- نص التعليمات يظهر فقط إذا فيه رحلات -->
            <p id="instructionText">Click on the trip you want to edit</p>

            <!-- Routes Table -->
            <table border="1">
                <thead>
                    <tr style="background:#eaf4ff;">
                        <th>From</th>
                        <th>To</th>
                        <th>Departure</th>
                        <th>Arrival</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="routeTable"></tbody>
            </table>

            <a href="dashboard.html"
                style="display:block; text-align:center; margin-top:20px; font-size:13px; color:#1e6fb9; text-decoration: none;">
                ← Back to Dashboard
            </a>

        </div>
    </div>

    <script>
        const routeForm = document.getElementById("routeForm");
        const table = document.getElementById("routeTable");
        const instructionText = document.getElementById("instructionText");
        let editRow = null;
        let routes = JSON.parse(localStorage.getItem("routes")) || [];

        function toggleInstruction() {
            instructionText.style.display = routes.length > 0 ? 'block' : 'none';
        }

        function addRow(from, to, departure, arrival) {
            const newRow = table.insertRow();
            newRow.insertCell(0).innerText = from;
            newRow.insertCell(1).innerText = to;
            newRow.insertCell(2).innerText = departure;
            newRow.insertCell(3).innerText = arrival;

            const actionCell = newRow.insertCell(4);

            const deleteBtn = document.createElement("button");
            deleteBtn.innerText = "Delete";
            deleteBtn.className = "action-btn-small";
            deleteBtn.style.background = "#c0392b";
            deleteBtn.style.display = "none";

            const editBtn = document.createElement("button");
            editBtn.innerText = "Edit";
            editBtn.className = "action-btn-small";
            editBtn.style.background = "#2980b9";
            editBtn.style.display = "none";

            const bookBtn = document.createElement("button");
            bookBtn.innerText = "Book";
            bookBtn.className = "action-btn-small";
            bookBtn.style.background = "#2ecc71";
            bookBtn.style.display = "none";

            actionCell.appendChild(deleteBtn);
            actionCell.appendChild(editBtn);
            actionCell.appendChild(bookBtn);

            newRow.addEventListener("click", () => {
                Array.from(table.rows).forEach(r => {
                    if (r !== newRow) {
                        const cell = r.cells[4];
                        if (cell) Array.from(cell.children).forEach(btn => btn.style.display = "none");
                    }
                });
                deleteBtn.style.display = "inline-block";
                editBtn.style.display = "inline-block";
                bookBtn.style.display = "inline-block";
            });

            deleteBtn.onclick = function () {
                const rowIndex = newRow.rowIndex - 1;
                table.deleteRow(rowIndex);
                routes.splice(rowIndex, 1);
                localStorage.setItem("routes", JSON.stringify(routes));
                toggleInstruction();
            };

            editBtn.onclick = function () {
                document.getElementById("from").value = from;
                document.getElementById("to").value = to;
                document.getElementById("departure").value = departure;
                document.getElementById("arrival").value = arrival;
                editRow = newRow;
            };

            bookBtn.onclick = function () {
                proceedToBooking(from, to, departure);
            };
        }

        routeForm.addEventListener("submit", function (e) {
            e.preventDefault();
            const from = document.getElementById("from").value;
            const to = document.getElementById("to").value;
            const departure = document.getElementById("departure").value;
            const arrival = document.getElementById("arrival").value;

            if (from === to) {
                alert("From and To must be different cities.");
                return;
            }

            if (editRow) {
                editRow.cells[0].innerText = from;
                editRow.cells[1].innerText = to;
                editRow.cells[2].innerText = departure;
                editRow.cells[3].innerText = arrival;
                editRow = null;
            } else {
                addRow(from, to, departure, arrival);
                routes.push({ from, to, departure, arrival });
                localStorage.setItem("routes", JSON.stringify(routes));
            }

            toggleInstruction();
            routeForm.reset();
        });

        routes.forEach(route => addRow(route.from, route.to, route.departure, route.arrival));
        toggleInstruction();

        function proceedToBooking(fromCity, toCity, departureTime) {
            const dateObj = new Date(departureTime);
            const dateStr = dateObj.toLocaleDateString();
            const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const selectedTripInfo = { route: fromCity + " → " + toCity, date: dateStr, time: timeStr };
            localStorage.setItem('selectedTrip', JSON.stringify(selectedTripInfo));
            window.location.href = 'Book.html';
        }

        const today = new Date().toISOString().slice(0, 16);
        document.getElementById("departure").min = today;
        document.getElementById("arrival").min = today;

        const role = localStorage.getItem('savedRole');
        if (role !== 'Admin') {
            alert("Access Denied! Admins only.");
            window.location.href = 'dashboard.html';
        }
    </script>

</body>
</html>
