<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>Booking Confirmation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

.ticket-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
text-align:center;
max-width:420px;
margin:auto;
}

.ticket-header{
color:#0d4e8a;
font-size:26px;
font-weight:bold;
margin-bottom:20px;
}

.ticket-info{
text-align:left;
font-size:16px;
margin:10px 0;
color:#333;
}

.ticket-info span{
color:#1e6fb9;
font-weight:bold;
}

.ticket-divider{
border-top:2px dashed #b7d8f7;
margin:20px 0;
}

.print-btn{
background:linear-gradient(135deg,#1e6fb9,#0d4e8a);
color:white;
border:none;
padding:12px;
border-radius:10px;
width:100%;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.print-btn:hover{
background:linear-gradient(135deg,#155a96,#083b6b);
}

.back-link{
display:block;
margin-top:15px;
text-decoration:none;
color:#1e6fb9;
font-weight:bold;
}

</style>

</head>

<body>

<div class="center-box">

<div class="ticket-card">

<div class="ticket-header">
Booking Confirmed 🎫
</div>

<div class="ticket-info">
Ticket ID: <span id="dispID"></span>
</div>

<div class="ticket-info">
Seats: <span id="dispSeats"></span>
</div>

<div class="ticket-info">
Total Price: <span id="dispPrice"></span> SAR
</div>

<div class="ticket-divider"></div>

<div id="qrcode" style="margin:20px auto; width:120px;"></div>

<button onclick="window.print()" class="print-btn">
Print Ticket
</button>

<a href="dashboard.html" class="back-link">
Back to dashboard
</a>

</div>

</div>

<script>

const data = JSON.parse(localStorage.getItem('currentBooking'));

if(data){

document.getElementById('dispID').innerText = data.ticketID;
document.getElementById('dispSeats').innerText = data.seats.join(', ');
document.getElementById('dispPrice').innerText = data.totalPrice;

const qrText =
"Ticket ID: " + data.ticketID +
"\nSeats: " + data.seats.join(', ') +
"\nPrice: " + data.totalPrice + " SAR";

new QRCode(document.getElementById("qrcode"),{
text: qrText,
width:120,
height:120
});

}

</script>

</body>
</html
