<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Cancel Ticket</title>

<style>
.success-box {
    display:none;
    background:#eaf7ea;
    border:1px solid #4CAF50;
    color:#2e7d32;
    padding:12px;
    margin-top:15px;
    border-radius:6px;
    font-size:13px;
}

.error-box {
    display:none;
    background:#ffe6e6;
    border:1px solid #ff4b4b;
    color:#a30000;
    padding:12px;
    margin-top:15px;
    border-radius:6px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="center-box">
<div class="container">

<h2 style="color:#0d4e8a;">Cancel Ticket</h2>

<label>Enter Ticket ID:</label>
<input type="text" id="tID" placeholder="e.g. T1234"
style="width:100%; padding:10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; text-transform: uppercase;">

<label>Reason for Cancellation:</label>
<select id="reasonSelect" onchange="toggleOtherReason()"
style="width:100%; padding:10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
<option value="" disabled selected>Select a reason...</option>
<option value="Change of plans">Change of plans</option>
<option value="Wrong booking details">Wrong booking details</option>
<option value="Found better schedule">Found better schedule</option>
<option value="Payment issue">Payment issue</option>
<option value="Train schedule changed">Train schedule changed</option>
<option value="Other">Other</option>
</select>

<input type="text" id="otherReason"
placeholder="Please specify..."
style="display:none; width:100%; padding:10px; margin-bottom:10px; border: 1px solid #ddd; border-radius: 5px;">

<button onclick="processCancel()" class="action-btn"
style="background:#ff4b4b; margin-top:10px;">
Cancel Ticket
</button>

<div id="errorMessage" class="error-box"></div>
<div id="successMessage" class="success-box"></div>

<a href="dashboard.html"
style="display:block; text-align:center; margin-top:15px; font-size:12px; color:#0d4e8a; text-decoration: none;">
← Back to Dashboard
</a>

</div>
</div>

<script>
function toggleOtherReason() {
    const selected = document.getElementById('reasonSelect').value;
    const otherInput = document.getElementById('otherReason');

    if (selected === 'Other') {
        otherInput.style.display = 'block';
        otherInput.focus();
    } else {
        otherInput.style.display = 'none';
        otherInput.value = '';
    }
}

function getCancelledTickets() {
    try {
        return JSON.parse(localStorage.getItem('cancelledTickets') || '{}');
    } catch {
        return {};
    }
}

function saveCancelledTickets(obj) {
    localStorage.setItem('cancelledTickets', JSON.stringify(obj));
}

function showBox(id, msg) {
    const el = document.getElementById(id);
    el.innerText = msg;
    el.style.display = 'block';
}

function hideBoxes() {
    document.getElementById('errorMessage').style.display = 'none';
    document.getElementById('successMessage').style.display = 'none';
}

function isValidTicketID(id) {
    const pattern = /^[A-Za-z][0-9]{1,4}$/;

    if (!pattern.test(id)) return false;

    const numericPart = id.slice(1);

    if (/^0+$/.test(numericPart)) return false;

    return true;
}

function processCancel() {

    hideBoxes();

    const idInput = document.getElementById('tID');
    const id = idInput.value.trim().toUpperCase();

    const selectedReason = document.getElementById('reasonSelect').value;
    const otherReason = document.getElementById('otherReason').value.trim();

    if (!id) {
        showBox('errorMessage', 'Please enter Ticket ID.');
        return;
    }

    const pattern = /^[A-Za-z][0-9]{1,4}$/;

    if (!pattern.test(id)) {
        showBox('errorMessage', 'Ticket ID must start with a letter followed by 1-4 digits. Example: T1234');
        return;
    }

    const numberPart = id.slice(1);

    if (/^0+$/.test(numberPart)) {
        showBox('errorMessage', 'Ticket ID cannot contain only zeros after the letter.');
        return;
    }

    if (!selectedReason) {
        showBox('errorMessage', 'Please select a cancellation reason.');
        return;
    }

    let finalReason = selectedReason;

    if (selectedReason === "Other") {
        if (!otherReason) {
            showBox('errorMessage', "Please specify the reason in 'Other'.");
            return;
        }
        finalReason = otherReason;
    }

    let history = JSON.parse(localStorage.getItem('bookingHistory')) || [];
    const bookingIndex = history.findIndex(b => b.ticketID === id);

    if (bookingIndex === -1) {
        showBox('errorMessage', `Ticket ${id} was not found.`);
        return;
    }

    if (history[bookingIndex].status === 'Cancelled') {
        showBox('errorMessage', `Ticket ${id} is already cancelled.`);
        return;
    }

    const ok = confirm(`Are you sure you want to cancel Ticket ${id}?`);
    if (!ok) return;

    history[bookingIndex].status = 'Cancelled';
    history[bookingIndex].cancelReason = finalReason;
    history[bookingIndex].cancelledAt = new Date().toISOString();

    localStorage.setItem('bookingHistory', JSON.stringify(history));

   
    let bookedSeats = JSON.parse(localStorage.getItem("bookedSeats")) || [];
    const cancelledSeats = history[bookingIndex].seats;
    bookedSeats = bookedSeats.filter(seat => !cancelledSeats.includes(seat));
    localStorage.setItem("bookedSeats", JSON.stringify(bookedSeats));
    const tripsData = JSON.parse(localStorage.getItem('tripsData') || '[]');
    const cancelledTrip = history[bookingIndex].route;
    const trip = tripsData.find(t => t.route === cancelledTrip);

    if(trip){
        trip.seats += 1;
        if(trip.seats > 38) trip.seats = 38;
        localStorage.setItem('tripsData', JSON.stringify(tripsData));
    }

    showBox('successMessage', `Ticket ${id} has been cancelled successfully.`);

    document.getElementById('tID').value = '';
    document.getElementById('reasonSelect').selectedIndex = 0;
    document.getElementById('otherReason').value = '';
    document.getElementById('otherReason').style.display = 'none';
}
</script>

</body>
</html>
