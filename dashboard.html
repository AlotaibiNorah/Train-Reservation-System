<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard</title>
    <style>
        /* ستايلات خاصة بالصفحة عشان ما نعدل ملف الـ CSS الأساسي */
        .hidden {
            display: none !important;
        }

        .admin-section {
            background: #eaf4ff;
            border: 1px dashed #1e6fb9;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
        }

        .admin-section p {
            font-size: 12px;
            color: #0d4e8a;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .mini-btn {
    display: block;      /* هذا السطر سيجعل كل زر ينزل في سطر جديد */
    width: 100%;         /* ليصبح عرض الزر متناسقاً */
    padding: 10px 20px;
    margin-bottom: 8px;  /* هذه هي المسافة البسيطة التي طلبتها بين الزرين */
    font-size: 14px;
    cursor: pointer;
}
    </style>
</head>

<body>
    <div class="center-box">
        <div class="container">
            <h2 id="dashTitle">Dashboard</h2>
            <p>Welcome, <b id="uName" style="color:#1e6fb9;"></b></p>
            <p style="font-size: 13px; color: #888; margin-bottom: 10px;">Role: <span id="uRole"></span></p>

            <div id="adminPanel" class="admin-section hidden">
                <p>Admin Control Panel</p>
                <button class="action-btn mini-btn" style="background:#333;"
                    onclick="window.location.href='routes.html'">
                    Manage Routes
                </button>
<button class="action-btn mini-btn" style="background:#0d4e8a;" onclick="window.location.href='reports.html'">
        Revenue Reports 📊
    </button>

<button class="action-btn mini-btn" style="background:#0d4e8a;" onclick="window.location.href='tripReports.html'">
        Trip Reports 📊
    </button>

            </div>

            <div id="staffPanel">
                <button class="action-btn" onclick="window.location.href='edit-profile.html'">
                    Edit Profile
                </button>

                <button class="action-btn" onclick="window.location.href='seats.html'">
                    Book Tickets
                </button>

                <button class="action-btn" onclick="window.location.href='Cancel.html'">
                    Cancel Booking
                </button>

                <button class="action-btn" onclick="window.location.href='history.html'">
                    Booking History
                </button>

                <button class="action-btn" style="background:#e74c3c; margin-top:20px;" onclick="logout()">
                    Logout
                </button>
            </div>
        </div>
    </div>


    <script>
        // التحقق من الصلاحيات عند تحميل الصفحة
        const savedEmail = localStorage.getItem('email');        // اسم مطابق للـ Register
        const savedRole = localStorage.getItem('savedRole');     // اسم مطابق للـ Register
        const savedName = localStorage.getItem('fullName');      // اسم مطابق للـ Register

        if (!savedEmail) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('uName').innerText = savedName || "User";
            document.getElementById('uRole').innerText = savedRole;

            // إظهار لوحة الأدمن فقط إذا كان الدور Admin
            if (savedRole === 'Admin') {
                document.getElementById('adminPanel').classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
