<!DOCTYPE html>
<html>

<head>
    <title>passenger profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="center-box">
        <div class="container">
            <h2>Passenger Profile</h2>
            <p><strong>Full Name:</strong> <span id="fullName"></span></p>
            <p><strong>Email:</strong> <span id="email"></span></p>
            <p><strong>Phone:</strong> <span id="phone"></span></p>
            <p><strong>ID:</strong> <span id="passengerID"></span></p>

            <a href="edit-profile.html">
                <button class="profile-btn">Edit Profile</button>
            </a>
            <a href="dashboard.html"><button class="profile-btn">Back Dashboard</button></a>
        </div>
    </div>
    <script>
        document.getElementById("fullName").textContent =
            localStorage.getItem("fullName");

        document.getElementById("email").textContent =
            localStorage.getItem("email");

        document.getElementById("phone").textContent =
            localStorage.getItem("phone");

        document.getElementById("passengerID").textContent =
            localStorage.getItem("passengerID");
    </script>
</body>

</html>
